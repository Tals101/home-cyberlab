title: Suspicious PowerShell Encoded Command Execution
id: 9a0f6f8d-9a91-4df4-98d2-1c95e2d0c301
status: experimental
description: Detects PowerShell process creation using EncodedCommand, which may indicate obfuscated command execution.
author: Threat Detection Engineering Portfolio Lab
date: 2026-06-16
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-encodedcommand'
      - '-enc'
      - '/enc'
  condition: selection_image and selection_encoded
falsepositives:
  - Legitimate administrative scripts
  - Software deployment tooling
  - Security testing in approved labs
level: high
