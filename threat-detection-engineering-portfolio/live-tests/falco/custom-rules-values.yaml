customRules:
  detection_lab_shell_spawned.yaml: |-
    - list: detection_lab_shells
      items: [sh, bash, ash, dash]

    - rule: Custom Detection Lab Shell Spawned In Container
      desc: Detects a shell spawned inside a container in the detection-lab namespace.
      condition: >
        spawned_process and
        container and
        proc.name in (detection_lab_shells) and
        k8s.ns.name = "detection-lab"
      output: >
        Custom Falco detection: shell spawned in detection-lab container
        user=%user.name
        command=%proc.cmdline
        container=%container.name
        image=%container.image.repository
        pod=%k8s.pod.name
        namespace=%k8s.ns.name
      priority: WARNING
      tags:
        - custom_detection
        - container
        - kubernetes
        - shell
        - mitre_t1611
