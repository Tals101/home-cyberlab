apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-web
  namespace: pt-app
  labels:
    app: target-web
    lab: purple-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-web
  template:
    metadata:
      labels:
        app: target-web
        lab: purple-team
    spec:
      containers:
      - name: target-web
        image: nginx:stable
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: target-web
  namespace: pt-app
  labels:
    app: target-web
    exposure: nodeport
spec:
  type: NodePort
  selector:
    app: target-web
  ports:
  - name: http
    port: 80
    targetPort: 80
