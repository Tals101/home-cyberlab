apiVersion: v1
kind: Secret
metadata:
  name: app-config-secret
  namespace: pt-app
  labels:
    lab: purple-team
    sensitivity: training-only
type: Opaque
stringData:
  database_password: training-password-only
  api_key: training-api-key-only
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: red-operator
  namespace: pt-red
  labels:
    lab: purple-team
    role: attacker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: weak-secret-reader
  namespace: pt-app
  labels:
    lab: purple-team
    weakness: excessive-secret-access
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: weak-secret-reader-binding
  namespace: pt-app
  labels:
    lab: purple-team
    weakness: cross-namespace-secret-access
subjects:
- kind: ServiceAccount
  name: red-operator
  namespace: pt-red
roleRef:
  kind: Role
  name: weak-secret-reader
  apiGroup: rbac.authorization.k8s.io
