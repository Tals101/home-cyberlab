apiVersion: v1
kind: Pod
metadata:
  name: log-inspector
  namespace: logging
spec:
  containers:
  - name: inspector
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: varlog
      mountPath: /host-var-log
      readOnly: true
  volumes:
  - name: varlog
    hostPath:
      path: /var/log
      type: Directory
