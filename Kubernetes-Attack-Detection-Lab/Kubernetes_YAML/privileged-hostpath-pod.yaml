apiVersion: v1
kind: Pod
metadata:
  name: privileged-hostpath-pod
  namespace: attack-lab
  labels:
    app: privileged-hostpath-pod
    lab: container-escape
spec:
  hostPID: true
  containers:
  - name: attacker
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      privileged: true
    volumeMounts:
    - name: host-root
      mountPath: /host
  volumes:
  - name: host-root
    hostPath:
      path: /
      type: Directory
