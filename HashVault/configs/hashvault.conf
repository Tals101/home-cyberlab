# HashVault Configuration File

# Hashing algorithm
HASH_ALGO=sha256

# Encryption settings
ENCRYPTION_ENABLED=true
ENCRYPTION_METHOD=aes-256-cbc

# Output locations
MANIFEST_DIR=manifests
REPORT_DIR=reports

# Behavior settings
RECURSIVE_SCAN=true
VERBOSE_OUTPUT=true

# Security settings
DELETE_TEMP_MANIFEST=true
