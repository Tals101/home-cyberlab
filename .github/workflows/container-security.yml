name: Container Image Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-scan:
    name: Build and Scan Container Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t container-security-demo:${{ github.sha }} ./container-image-security-pipeline

      - name: Run Trivy vulnerability gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: container-security-demo:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1