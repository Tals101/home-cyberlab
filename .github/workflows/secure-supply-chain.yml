name: Secure Software Supply Chain

on:
  push:
    branches: [ "main" ]
    paths:
      - "secure-software-supply-chain/**"
      - ".github/workflows/secure-supply-chain.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "secure-software-supply-chain/**"
      - ".github/workflows/secure-supply-chain.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  PROJECT_DIR: secure-software-supply-chain
  LOCAL_IMAGE: secure-supply-chain-demo:${{ github.sha }}

jobs:
  secure-supply-chain:
    name: Build, Scan, SBOM, and Sign
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase GHCR image name
        shell: bash
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${REPO_LOWER}/secure-supply-chain-demo" >> "$GITHUB_ENV"

      - name: SAST scan with Bandit
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r app -ll

      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source=secure-software-supply-chain --redact --exit-code 1

      - name: Dependency and filesystem scanning with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ env.PROJECT_DIR }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./${{ env.PROJECT_DIR }}
          format: spdx-json
          output-file: secure-supply-chain-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-supply-chain-sbom
          path: secure-supply-chain-sbom.spdx.json

      - name: Build container image
        run: docker build -t $LOCAL_IMAGE ./${{ env.PROJECT_DIR }}

      - name: Container image scanning with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          docker tag "$LOCAL_IMAGE" "$IMAGE_NAME:${GITHUB_SHA}"
          docker push "$IMAGE_NAME:${GITHUB_SHA}"

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign keyless signing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          cosign sign --yes "$IMAGE_NAME:${GITHUB_SHA}"