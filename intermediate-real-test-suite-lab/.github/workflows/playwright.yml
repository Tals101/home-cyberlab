name: Playwright Intermediate Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://www.saucedemo.com
      VALID_USERNAME: standard_user
      VALID_PASSWORD: secret_sauce
      INVALID_USERNAME: locked_out_user
      INVALID_PASSWORD: wrong_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: playwright-lab/intermediate-real-test-suite-lab

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: playwright-lab/intermediate-real-test-suite-lab

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: playwright-lab/intermediate-real-test-suite-lab

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-lab/intermediate-real-test-suite-lab/playwright-report/
          retention-days: 30