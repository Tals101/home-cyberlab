server {
    listen 80;

    location / {
        proxy_pass http://vulnerable_app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Misconfiguration: exposes debug endpoint through proxy
    location /debug {
        proxy_pass http://vulnerable_app:5000/debug;
    }

    # Misconfiguration: forwards admin endpoint without extra protection
    location /admin {
        proxy_pass http://vulnerable_app:5000/admin;
    }
}