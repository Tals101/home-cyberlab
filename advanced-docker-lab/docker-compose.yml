version: "3.8"

services:
  vulnerable_app:
    build: ./vulnerable-app
    container_name: phase2_vulnerable_app
    restart: always

  nginx:
    image: nginx:latest
    container_name: phase2_nginx_proxy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vulnerable_app
    restart: always

  kali:
    image: kalilinux/kali-rolling
    container_name: phase2_kali
    tty: true
    stdin_open: true
    command: /bin/bash

  internal_app:
    image: nginx:alpine
    container_name: phase2_internal_app
    expose:
      - "80"
    restart: always