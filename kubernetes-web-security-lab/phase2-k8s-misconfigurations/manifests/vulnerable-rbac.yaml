apiVersion: v1
kind: ServiceAccount
metadata:
  name: vulnerable-sa
  namespace: web-security-lab

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vulnerable-role
  namespace: web-security-lab
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - secrets
  verbs:
    - get
    - list
    - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vulnerable-rolebinding
  namespace: web-security-lab
subjects:
- kind: ServiceAccount
  name: vulnerable-sa
  namespace: web-security-lab

roleRef:
  kind: Role
  name: vulnerable-role
  apiGroup: rbac.authorization.k8s.io