apiVersion: v1
kind: Secret
metadata:
  name: app-config-secret
  namespace: de-target
type: Opaque
stringData:
  DB_USERNAME: app_user
  DB_PASSWORD: SuperFakeLabPassword123!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: de-target
  labels:
    app: vulnerable-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-web
  template:
    metadata:
      labels:
        app: vulnerable-web
    spec:
      containers:
      - name: vulnerable-web
        image: nginx:stable
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-web
  namespace: de-target
spec:
  selector:
    app: vulnerable-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
